<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'none'; base-uri 'self'; object-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS JS — Iniciando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: #020408;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden; user-select: none;
      -webkit-app-region: drag;
      padding: 20px; position: relative;
    }
    body::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(rgba(0,191,255,0.025) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0,191,255,0.025) 1px, transparent 1px);
      background-size: 24px 24px; background-position: center;
      mask-image: radial-gradient(circle, black, transparent 75%);
      -webkit-mask-image: radial-gradient(circle, black, transparent 75%);
      pointer-events: none; z-index: 0;
    }
    .bg-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute; width: 2px; height: 2px;
      border-radius: 50%; background: rgba(0,191,255,0.3);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(105vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
    .reactor-container {
      position: relative; width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px; z-index: 1; -webkit-app-region: no-drag;
    }
    .reactor-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(0,191,255,0.5)); }
    .ring-outer { transform-origin: 100px 100px; animation: rotate-cw 14s linear infinite; }
    .ring-middle { transform-origin: 100px 100px; animation: rotate-ccw 10s linear infinite; }
    .ring-inner { transform-origin: 100px 100px; animation: rotate-cw 6s linear infinite; }
    .core-pulse { transform-origin: 100px 100px; animation: pulse-grow 2.5s ease-in-out infinite; }
    @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes pulse-grow {
      0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 5px rgba(0,191,255,0.8)); }
      50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 20px rgba(0,191,255,1)); }
    }
    .brand-name {
      font-size: 24px; font-weight: 800; letter-spacing: 10px;
      color: #fff; text-transform: uppercase; margin-bottom: 2px;
      background: linear-gradient(135deg, #fff 0%, #00bfff 50%, #8a2be2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: fade-in 0.8s ease-out; z-index: 1;
    }
    .brand-subtitle {
      font-size: 9px; letter-spacing: 5px;
      color: rgba(0,191,255,0.45); text-transform: uppercase;
      margin-bottom: 24px; animation: fade-in 1s ease-out; z-index: 1;
    }
    .v3-badge {
      font-size: 10px; color: rgba(0,191,255,0.5);
      letter-spacing: 3px; margin-bottom: 18px;
      z-index: 1; animation: fade-in 1.4s ease-out;
    }
    .os-card {
      width: 270px;
      background: rgba(5,10,20,0.6); border: 1px solid rgba(0,191,255,0.12);
      border-radius: 6px; padding: 7px 12px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 22px; z-index: 1; animation: fade-in 1.2s ease-out;
    }
    .os-icon { font-size: 13px; color: #00bfff; }
    .os-text { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.75); }
    .progress-wrapper { width: 270px; margin-bottom: 10px; z-index: 1; }
    .progress-bar-bg {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00bfff, #8a2be2);
      border-radius: 2px; transition: width 0.5s cubic-bezier(0.1,0.8,0.25,1);
    }
    .status-text {
      font-size: 10px; color: rgba(0,191,255,0.65);
      letter-spacing: 1px; text-align: center;
      height: 16px; width: 270px; z-index: 1; margin-bottom: 28px;
      font-weight: 500; text-transform: uppercase; font-family: monospace;
    }
    .start-btn {
      width: 270px;
      background: linear-gradient(135deg, rgba(0,191,255,0.12), rgba(138,43,226,0.12));
      border: 1px solid rgba(0,191,255,0.3); border-radius: 6px; padding: 11px;
      color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 3px;
      cursor: pointer; transition: all 0.3s ease; z-index: 2;
      opacity: 0; transform: translateY(12px); pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; -webkit-app-region: no-drag; margin-bottom: 20px;
    }
    .start-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .start-btn:hover {
      background: linear-gradient(135deg, rgba(0,191,255,0.25), rgba(138,43,226,0.25));
      border-color: #00bfff;
    }
    .start-btn:active { transform: scale(0.97); }
    .context-bar {
      position: absolute; bottom: 18px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 18px; opacity: 0;
      animation: fade-in 1s ease-out 0.5s forwards; z-index: 1;
    }
    .ctx-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .ctx-label { font-size: 7px; letter-spacing: 2px; color: rgba(255,255,255,0.2); text-transform: uppercase; }
    .ctx-value { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.4); }
    .ctx-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.06); }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    body.done { animation: splash-out 0.7s cubic-bezier(0.7,0,0.3,1) forwards; }
    @keyframes splash-out { to { opacity: 0; transform: scale(1.05) translateY(-8px); } }
  </style>
</head>
<body>
  <div class="bg-particles" id="particles"></div>
  <div class="reactor-container">
    <svg class="reactor-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="85" fill="url(#reactor-glow)" opacity="0.12" />
      <g class="ring-outer">
        <circle cx="100" cy="100" r="75" stroke="#00bfff" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="10 25" />
        <circle cx="100" cy="100" r="71" stroke="#00bfff" stroke-width="0.6" stroke-opacity="0.15" stroke-dasharray="4 5" />
      </g>
      <g class="ring-middle">
        <circle cx="100" cy="100" r="58" stroke="#00bfff" stroke-width="4" stroke-opacity="0.4" stroke-dasharray="30 20" />
        <circle cx="100" cy="100" r="50" stroke="#8a2be2" stroke-width="0.8" stroke-opacity="0.25" />
      </g>
      <g stroke="#00bfff" stroke-width="0.8" stroke-opacity="0.35">
        <line x1="100" y1="25" x2="100" y2="40" /><line x1="100" y1="160" x2="100" y2="175" />
        <line x1="25" y1="100" x2="40" y2="100" /><line x1="160" y1="100" x2="175" y2="100" />
        <line x1="47" y1="47" x2="58" y2="58" /><line x1="142" y1="142" x2="153" y2="153" />
        <line x1="47" y1="153" x2="58" y2="142" /><line x1="142" y1="58" x2="153" y2="47" />
      </g>
      <g class="ring-inner">
        <circle cx="100" cy="100" r="32" stroke="#00bfff" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="15 8" />
      </g>
      <circle class="core-pulse" cx="100" cy="100" r="20" fill="url(#core-gradient)" />
      <defs>
        <radialGradient id="reactor-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00bfff" /><stop offset="100%" stop-color="transparent" />
        </radialGradient>
        <radialGradient id="core-gradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffffff" /><stop offset="35%" stop-color="#00bfff" /><stop offset="100%" stop-color="#8a2be2" />
        </radialGradient>
      </defs>
    </svg>
  </div>
  <div class="brand-name">JARVIS JS</div>
  <div class="brand-subtitle">Plataforma Cognitiva</div>
  <div class="v3-badge">V3.0.0</div>
  <div class="os-card">
    <span class="os-icon" id="os-icon-element">❖</span>
    <span class="os-text" id="os-text-element">Verificando plataforma...</span>
  </div>
  <div class="progress-wrapper">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="status-text" id="status-text">Inicializando...</div>
  <button class="start-btn" id="start-btn" onclick="startProtocol()">
    <span>INICIAR SISTEMA</span>
  </button>
  <div class="context-bar" id="context-bar">
    <div class="ctx-item">
      <span class="ctx-label">Hora</span>
      <span class="ctx-value" id="ctx-time">--:--</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item">
      <span class="ctx-label">Fecha</span>
      <span class="ctx-value" id="ctx-date">---</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item">
      <span class="ctx-label">Versión</span>
      <span class="ctx-value" id="ctx-version">v3.0.0</span>
    </div>
  </div>
  <script src="js/splash.js"></script>
</body>
</html>
