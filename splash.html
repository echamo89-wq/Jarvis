<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis — Iniciando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* ── Partículas de fondo ── */
    .bg-particles {
      position: absolute; inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: rgba(99, 179, 237, 0.4);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* ── Anillo de luz exterior ── */
    .outer-ring {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .ring-spin {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(99, 179, 237, 0.8);
      border-right-color: rgba(99, 179, 237, 0.2);
      animation: spin 2s linear infinite;
    }

    .ring-spin-2 {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(147, 112, 219, 0.6);
      border-left-color: rgba(147, 112, 219, 0.1);
      animation: spin 3s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Logo container ── */
    .logo-container {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1f2e, #0a0d14);
      box-shadow:
        0 0 40px rgba(99, 179, 237, 0.15),
        0 0 80px rgba(99, 179, 237, 0.05),
        inset 0 0 30px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(99,179,237,0.15), 0 0 80px rgba(99,179,237,0.05), inset 0 0 30px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 60px rgba(99,179,237,0.30), 0 0 120px rgba(99,179,237,0.10), inset 0 0 30px rgba(0,0,0,0.5); }
    }

    .logo-container img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 0 12px rgba(99, 179, 237, 0.6));
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    /* ── Scan lines ── */
    .logo-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(99, 179, 237, 0.02) 3px,
        rgba(99, 179, 237, 0.02) 4px
      );
      animation: scan 4s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }

    /* ── Nombre ── */
    .brand-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #e0eaff 0%, #63b3ed 50%, #9370db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fade-in 0.8s ease-out;
    }

    .brand-subtitle {
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(99, 179, 237, 0.5);
      text-transform: uppercase;
      margin-bottom: 40px;
      animation: fade-in 1s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Barra de progreso ── */
    .progress-wrapper {
      width: 280px;
      margin-bottom: 16px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #63b3ed, #9370db);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(99, 179, 237, 0.6);
    }

    /* ── Estado de carga ── */
    .status-text {
      font-size: 11px;
      color: rgba(99, 179, 237, 0.7);
      letter-spacing: 1px;
      text-align: center;
      height: 16px;
      transition: opacity 0.3s ease;
      width: 280px;
    }

    /* ── Info de contexto (hora, fecha) ── */
    .context-bar {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      animation: fade-in 1s ease-out 0.5s forwards;
    }

    .ctx-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .ctx-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    .ctx-value {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }

    .ctx-sep {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.1);
    }

    /* ── Versión ── */
    .version-tag {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }

    /* ── Fade out al terminar ── */
    body.done {
      animation: splash-out 0.4s ease-in forwards;
    }

    @keyframes splash-out {
      to { opacity: 0; transform: scale(1.02); }
    }
  </style>
</head>
<body>

  <!-- Partículas de fondo -->
  <div class="bg-particles" id="particles"></div>

  <!-- Versión -->
  <div class="version-tag" id="version-tag">v1.2.0</div>

  <!-- Logo con anillos -->
  <div class="outer-ring">
    <div class="ring-spin"></div>
    <div class="ring-spin-2"></div>
    <div class="logo-container">
      <img src="build/icon.png" alt="Jarvis" onerror="this.style.display='none'; document.querySelector('.logo-container').innerHTML += '<div style=\'font-size:48px\'>J</div>'">
    </div>
  </div>

  <!-- Nombre -->
  <div class="brand-name">JARVIS</div>
  <div class="brand-subtitle">Asistente Virtual — IA</div>

  <!-- Barra de progreso -->
  <div class="progress-wrapper">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Estado actual -->
  <div class="status-text" id="status-text">Iniciando sistemas...</div>

  <!-- Contexto: hora y fecha -->
  <div class="context-bar" id="context-bar">
    <div class="ctx-item">
      <span class="ctx-label">Hora</span>
      <span class="ctx-value" id="ctx-time">--:--</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item">
      <span class="ctx-label">Fecha</span>
      <span class="ctx-value" id="ctx-date">---</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item">
      <span class="ctx-label">Sesión</span>
      <span class="ctx-value" id="ctx-session">--</span>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── Partículas
    const particleContainer = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = `${Math.random() * 100}%`;
      p.style.animationDuration = `${5 + Math.random() * 10}s`;
      p.style.animationDelay = `${Math.random() * 8}s`;
      p.style.width = p.style.height = `${1 + Math.random() * 2}px`;
      particleContainer.appendChild(p);
    }

    // ── Reloj en tiempo real
    function updateClock() {
      const now = new Date();
      const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      document.getElementById('ctx-time').textContent =
        now.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', hour12: false });
      document.getElementById('ctx-date').textContent =
        `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Número de sesión desde localStorage
    const sessions = parseInt(localStorage.getItem('jarvis_session_count') || '0') + 1;
    localStorage.setItem('jarvis_session_count', sessions);
    document.getElementById('ctx-session').textContent = `#${sessions}`;

    // ── Progreso
    const fill = document.getElementById('progress-fill');
    const statusEl = document.getElementById('status-text');
    let currentProgress = 0;

    function setProgress(pct, text) {
      currentProgress = Math.max(currentProgress, pct);
      fill.style.width = currentProgress + '%';
      if (text) {
        statusEl.style.opacity = '0';
        setTimeout(() => {
          statusEl.textContent = text;
          statusEl.style.opacity = '1';
        }, 150);
      }
    }

    // ── Recibir progreso del proceso principal
    ipcRenderer.on('splash-progress', (event, { pct, text }) => {
      setProgress(pct, text);
    });

    // ── Recibir señal de finalización
    ipcRenderer.on('splash-done', () => {
      setProgress(100, 'Sistemas listos');
      setTimeout(() => {
        document.body.classList.add('done');
        setTimeout(() => ipcRenderer.send('splash-finished'), 400);
      }, 500);
    });

    // ── Avisar al main que la splash está lista
    ipcRenderer.send('splash-ready');
  </script>
</body>
</html>
